<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - FastForward</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0fdf4; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-sm">

        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-green-700">FastForward</h1>
            <p class="text-gray-500 text-sm mt-1">Change your password</p>
        </div>

        <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <ul class="mb-4">
                    {% for category, message in messages %}
                        <li class="p-3 rounded-lg text-sm mb-2
                            {% if category == 'success' %}bg-green-100 text-green-800
                            {% elif category == 'danger' or category == 'error' %}bg-red-100 text-red-800
                            {% else %}bg-blue-100 text-blue-800{% endif %}">
                            {{ message }}
                        </li>
                    {% endfor %}
                    </ul>
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('change_password') }}">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Current password</label>
                    <input type="password" name="current_password" required
                           class="w-full p-3 border border-gray-200 rounded-lg focus:ring-green-500 focus:border-green-500 text-sm"
                           placeholder="Enter current password">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">New password</label>
                    <input type="password" name="new_password" required minlength="6"
                           class="w-full p-3 border border-gray-200 rounded-lg focus:ring-green-500 focus:border-green-500 text-sm"
                           placeholder="At least 6 characters">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Confirm new password</label>
                    <input type="password" name="confirm_password" required minlength="6"
                           class="w-full p-3 border border-gray-200 rounded-lg focus:ring-green-500 focus:border-green-500 text-sm"
                           placeholder="Repeat new password">
                </div>
                <button type="submit"
                        class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-xl transition duration-150">
                    Update password
                </button>
            </form>

            <div class="mt-4 text-center">
                <a href="{{ url_for('dashboard') }}" class="text-sm text-gray-500 hover:underline">
                    Back to dashboard
                </a>
            </div>

        </div>
    </div>
</body>
</html>
